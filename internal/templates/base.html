<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{block "title" .}}Stronglifts{{end}}</title>
  <script src="https://unpkg.com/htmx.org@1.9.10" integrity="sha384-D1Kt99CQMDuVetoL1lrYwg5t+9QdHe7NLX/SoJYkXDFfX37iInKRy5ViYgSibmK" crossorigin="anonymous"></script>
  <script>
    (function() {
      try {
        var key = 'smolt-theme';
        var vimPalettes = {
          blue:      {bg:'#0f233a',surface:'#12304e',border:'#2f4f6f',accent:'#5fa8ff',accentDim:'#3c82d9',green:'#8adf8a',red:'#ff7f7f',yellow:'#ffd27f',text:'#e8f2ff',muted:'#a7c1dd'},
          darkblue:  {bg:'#0a1726',surface:'#10243a',border:'#29435f',accent:'#4f8fd8',accentDim:'#3a73b8',green:'#7bd68e',red:'#e47d7d',yellow:'#e0bd76',text:'#d7e6f6',muted:'#90a7bf'},
          default:   {bg:'#f8f8f8',surface:'#ffffff',border:'#d8d8d8',accent:'#005f87',accentDim:'#00486a',green:'#2e7d32',red:'#b71c1c',yellow:'#a36a00',text:'#202020',muted:'#5f5f5f'},
          delek:     {bg:'#121212',surface:'#1c1c1c',border:'#3a3a3a',accent:'#87afff',accentDim:'#5f87d7',green:'#87d787',red:'#d78787',yellow:'#d7af5f',text:'#e4e4e4',muted:'#b2b2b2'},
          desert:    {bg:'#333333',surface:'#3f3f3f',border:'#5f5f5f',accent:'#ffd75f',accentDim:'#d7af5f',green:'#87af5f',red:'#d75f5f',yellow:'#d7af5f',text:'#f0e7d5',muted:'#c3b9a2'},
          elflord:   {bg:'#202020',surface:'#2a2a2a',border:'#444444',accent:'#8cd0d3',accentDim:'#6ca9ac',green:'#7f9f7f',red:'#dca3a3',yellow:'#f0dfaf',text:'#dcdccc',muted:'#9faf9f'},
          evening:   {bg:'#232526',surface:'#2f3133',border:'#50545a',accent:'#8ec7ff',accentDim:'#699fce',green:'#9fd39f',red:'#d78f8f',yellow:'#d7c38f',text:'#f0f0f0',muted:'#b8b8b8'},
          habamax:   {bg:'#1f2430',surface:'#272d3a',border:'#434c5f',accent:'#7dcfff',accentDim:'#5ea8d6',green:'#98c379',red:'#e06c75',yellow:'#e5c07b',text:'#d8dee9',muted:'#9aa5b1'},
          industry:  {bg:'#2b2b2b',surface:'#363636',border:'#4c4c4c',accent:'#87afd7',accentDim:'#5f87af',green:'#87af87',red:'#af5f5f',yellow:'#af875f',text:'#dddddd',muted:'#b0b0b0'},
          koehler:   {bg:'#1b1b1b',surface:'#252525',border:'#3f3f3f',accent:'#87d7ff',accentDim:'#5fafd7',green:'#87d787',red:'#ff8787',yellow:'#ffd787',text:'#f0f0f0',muted:'#bfbfbf'},
          lunaperche:{bg:'#2b1f2f',surface:'#3a2a40',border:'#5a4860',accent:'#f6c177',accentDim:'#d9a55d',green:'#9ccfd8',red:'#eb6f92',yellow:'#f6c177',text:'#f2e9e1',muted:'#c3b6ae'},
          morning:   {bg:'#fffaf2',surface:'#ffffff',border:'#e8dcc8',accent:'#c65a00',accentDim:'#a34700',green:'#3f7f5f',red:'#af3a3a',yellow:'#a26b1f',text:'#3b2f2f',muted:'#7a6464'},
          murphy:    {bg:'#2a2a2a',surface:'#343434',border:'#4f4f4f',accent:'#87afff',accentDim:'#5f87d7',green:'#5faf87',red:'#af5f5f',yellow:'#af875f',text:'#e6e6e6',muted:'#b8b8b8'},
          pablo:     {bg:'#121212',surface:'#1c1c1c',border:'#383838',accent:'#5fafff',accentDim:'#3f8fd8',green:'#87af87',red:'#d78787',yellow:'#d7af5f',text:'#d7d7d7',muted:'#a8a8a8'},
          peachpuff: {bg:'#fff0e0',surface:'#fff7ef',border:'#e7c6a5',accent:'#c46a2d',accentDim:'#9f5120',green:'#2f855a',red:'#c53030',yellow:'#b7791f',text:'#3b2412',muted:'#80563d'},
          quiet:     {bg:'#111315',surface:'#171a1d',border:'#2e3338',accent:'#8ab4f8',accentDim:'#6d94d4',green:'#81c995',red:'#f28b82',yellow:'#fdd663',text:'#e8eaed',muted:'#9aa0a6'},
          retrobox:  {bg:'#1f1a12',surface:'#2a2319',border:'#4c3f2d',accent:'#ffd787',accentDim:'#d7af5f',green:'#87af87',red:'#d78787',yellow:'#d7af5f',text:'#f4e8d0',muted:'#c3b9a0'},
          ron:       {bg:'#1e1e1e',surface:'#282828',border:'#444444',accent:'#87afff',accentDim:'#5f87d7',green:'#87d787',red:'#d78787',yellow:'#d7af5f',text:'#e8e8e8',muted:'#b7b7b7'},
          shine:     {bg:'#f9f9f9',surface:'#ffffff',border:'#d7d7d7',accent:'#005f87',accentDim:'#00486a',green:'#2f7f5f',red:'#af3f3f',yellow:'#a26b1f',text:'#262626',muted:'#606060'},
          slate:     {bg:'#22282f',surface:'#2b333c',border:'#465463',accent:'#9ecbff',accentDim:'#78a5d6',green:'#8fcf9b',red:'#d99696',yellow:'#d9c18f',text:'#e7edf4',muted:'#b0bdc9'},
          sorbet:    {bg:'#2b1d2f',surface:'#38263d',border:'#59455f',accent:'#ff9ecb',accentDim:'#d97da8',green:'#a6e3a1',red:'#f38ba8',yellow:'#f9e2af',text:'#f2e9f4',muted:'#c6b7cc'},
          torte:     {bg:'#242424',surface:'#2e2e2e',border:'#484848',accent:'#87afff',accentDim:'#5f87d7',green:'#87af87',red:'#af5f5f',yellow:'#af875f',text:'#e0e0e0',muted:'#b0b0b0'},
          wildcharm: {bg:'#111111',surface:'#1a1a1a',border:'#333333',accent:'#d7af5f',accentDim:'#af8744',green:'#87af5f',red:'#af5f5f',yellow:'#d7af5f',text:'#e4d7b9',muted:'#b8ac90'},
          zaibatsu:  {bg:'#0d1a12',surface:'#13261a',border:'#2b4635',accent:'#72d98c',accentDim:'#4fbf70',green:'#7ce38f',red:'#d97b7b',yellow:'#d9c97b',text:'#d9f2df',muted:'#9ec7ab'},
          zellner:   {bg:'#1a1a2a',surface:'#24243a',border:'#3d3d5a',accent:'#8a9bff',accentDim:'#6b7bd6',green:'#8ad6a1',red:'#d68a8a',yellow:'#d6c78a',text:'#e8e8ff',muted:'#b3b3cf'}
        };
        var vimThemes = Object.keys(vimPalettes);
        var validThemes = ['light', 'dark', 'forest', 'sunset', 'dark_hc'].concat(vimThemes);
        var cssVars = ['bg','surface','border','accent','accentDim','green','red','yellow','text','muted'];
        function applyPalette(theme) {
          var root = document.documentElement;
          var palette = vimPalettes[theme];
          if (!palette) {
            cssVars.forEach(function(key) {
              var cssName = key === 'accentDim' ? '--accent-dim' : ('--' + key);
              root.style.removeProperty(cssName);
            });
            return;
          }
          cssVars.forEach(function(key) {
            var cssName = key === 'accentDim' ? '--accent-dim' : ('--' + key);
            root.style.setProperty(cssName, palette[key]);
          });
        }
        var serverTheme = '{{.ThemePref}}';
        var theme = localStorage.getItem(key) || 'light';
        if (validThemes.indexOf(serverTheme) !== -1) {
          theme = serverTheme;
        }
        if (validThemes.indexOf(theme) === -1) {
          theme = 'light';
        }
        localStorage.setItem(key, theme);
        document.documentElement.setAttribute('data-theme', theme);
        applyPalette(theme);
        window.smoltVimThemeNames = vimThemes;
        window.smoltApplyThemePalette = applyPalette;
      } catch (_) {}
    })();

    (function() {
      var keepAwakeEnabled = '{{if .KeepAwakePref}}1{{else}}0{{end}}' === '1';
      var wakeLock = null;

      async function requestWakeLock() {
        if (!keepAwakeEnabled) return;
        if (!('wakeLock' in navigator) || document.visibilityState !== 'visible') return;
        try {
          wakeLock = await navigator.wakeLock.request('screen');
          wakeLock.addEventListener('release', function() {
            wakeLock = null;
          });
        } catch (_) {}
      }

      async function releaseWakeLock() {
        if (!wakeLock) return;
        try {
          await wakeLock.release();
        } catch (_) {}
        wakeLock = null;
      }

      document.addEventListener('visibilitychange', function() {
        if (document.visibilityState === 'visible') {
          requestWakeLock();
        } else {
          releaseWakeLock();
        }
      });

      window.addEventListener('pageshow', function() {
        requestWakeLock();
      });

      window.smoltWakeApi = {
        setEnabled: function(enabled) {
          keepAwakeEnabled = !!enabled;
          if (keepAwakeEnabled) {
            requestWakeLock();
          } else {
            releaseWakeLock();
          }
        }
      };

      requestWakeLock();
    })();
  </script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #f5f7fb;
      --surface:   #ffffff;
      --border:    #d8dfeb;
      --accent:    #2f6fed;
      --accent-dim:#1d56c6;
      --green:     #16a34a;
      --red:       #dc2626;
      --yellow:    #ca8a04;
      --text:      #0f172a;
      --muted:     #55627a;
      --radius:    12px;
    }

    html[data-theme="light"] {
      --bg:        #f5f7fb;
      --surface:   #ffffff;
      --border:    #d8dfeb;
      --accent:    #2f6fed;
      --accent-dim:#1d56c6;
      --green:     #16a34a;
      --red:       #dc2626;
      --yellow:    #ca8a04;
      --text:      #0f172a;
      --muted:     #55627a;
    }

    html[data-theme="dark"] {
      --bg:        #0f1117;
      --surface:   #1c1f2e;
      --border:    #2a2d3e;
      --accent:    #6c63ff;
      --accent-dim:#4b44cc;
      --green:     #22c55e;
      --red:       #ef4444;
      --yellow:    #f59e0b;
      --text:      #e2e8f0;
      --muted:     #94a3b8;
    }

    html[data-theme="forest"] {
      --bg:        #eef4ef;
      --surface:   #f9fcf7;
      --border:    #c7d8c6;
      --accent:    #1f7a4b;
      --accent-dim:#155a37;
      --green:     #15803d;
      --red:       #b91c1c;
      --yellow:    #a16207;
      --text:      #143322;
      --muted:     #486557;
    }

    html[data-theme="sunset"] {
      --bg:        #fff3eb;
      --surface:   #ffffff;
      --border:    #f3c8ae;
      --accent:    #d94f2b;
      --accent-dim:#af3d1e;
      --green:     #2f855a;
      --red:       #c53030;
      --yellow:    #b7791f;
      --text:      #402018;
      --muted:     #7a4a3a;
    }

    html[data-theme="peachpuff"] {
      --bg:        #fff0e0;
      --surface:   #fff7ef;
      --border:    #e7c6a5;
      --accent:    #c46a2d;
      --accent-dim:#9f5120;
      --green:     #2f855a;
      --red:       #c53030;
      --yellow:    #b7791f;
      --text:      #3b2412;
      --muted:     #80563d;
    }

    html[data-theme="dark_hc"] {
      --bg:        #000000;
      --surface:   #0d0d0d;
      --border:    #4d4d4d;
      --accent:    #00e5ff;
      --accent-dim:#00b8cc;
      --green:     #39ff88;
      --red:       #ff4d4d;
      --yellow:    #ffd447;
      --text:      #ffffff;
      --muted:     #d1d5db;
    }



    body {
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      font-size: 16px;
      min-height: 100dvh;
    }

    /* ---- Nav ---- */
    nav {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 1rem 1.5rem;
      border-bottom: 1px solid var(--border);
      background: var(--surface);
    }
    nav .logo {
      font-weight: 700;
      font-size: 1.1rem;
      letter-spacing: .04em;
      color: var(--text);
      text-decoration: none;
      display: inline-flex;
      align-items: center;
    }
    nav .logo span { color: var(--accent); }
    nav .nav-actions { display: flex; gap: .75rem; align-items: center; }
    nav .username { color: var(--muted); font-size: .875rem; }
    .theme-wrap { position: relative; }
    .theme-menu {
      position: absolute;
      right: 0;
      top: calc(100% + .4rem);
      min-width: 180px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      box-shadow: 0 10px 30px #00000022;
      padding: .4rem;
      z-index: 20;
    }
    .theme-option {
      width: 100%;
      border: 1px solid transparent;
      background: transparent;
      color: var(--text);
      text-align: left;
      border-radius: 8px;
      padding: .45rem .6rem;
      cursor: pointer;
      font-size: .85rem;
    }
    .theme-option:hover { background: var(--bg); border-color: var(--border); }
    .theme-option.active { border-color: var(--accent); color: var(--accent); font-weight: 700; }
    .theme-divider { height: 1px; background: var(--border); margin: .3rem 0; }

    /* ---- Buttons ---- */
    .btn {
      display: inline-flex; align-items: center; justify-content: center;
      padding: .55rem 1.25rem; border-radius: 8px;
      font-size: .9rem; font-weight: 600; cursor: pointer; border: none;
      transition: opacity .15s, transform .1s;
      text-decoration: none;
    }
    .btn:active { transform: scale(.97); }
    .btn-primary { background: var(--accent); color: #fff; }
    .btn-primary:hover { background: var(--accent-dim); }
    .btn-ghost { background: transparent; color: var(--muted); border: 1px solid var(--border); }
    .btn-ghost:hover { color: var(--text); border-color: var(--muted); }
    .btn-sm { padding: .35rem .9rem; font-size: .8rem; }
    .btn-danger { background: var(--red); color: #fff; }
    .btn-success { background: var(--green); color: #000; font-weight: 700; }

    /* ---- Page layout ---- */
    .page { max-width: 640px; margin: 0 auto; padding: 1.5rem 1rem 4rem; }

    /* ---- Cards ---- */
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 1.5rem;
      margin-bottom: 1rem;
    }
    .card-title { font-weight: 700; font-size: 1rem; margin-bottom: .25rem; }
    .card-subtitle { color: var(--muted); font-size: .85rem; }

    /* ---- Badge ---- */
    .badge {
      display: inline-block;
      padding: .2rem .65rem; border-radius: 999px;
      font-size: .75rem; font-weight: 600;
    }
    .badge-a { background: #6c63ff33; color: var(--accent); }
    .badge-b { background: #22c55e22; color: var(--green); }

    /* ---- Exercise list in dashboard ---- */
    .exercise-list { list-style: none; margin-top: 1rem; display: flex; flex-direction: column; gap: .5rem; }
    .exercise-row {
      display: flex; align-items: center; justify-content: space-between;
      padding: .75rem 1rem;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 8px;
    }
    .exercise-name { font-weight: 600; font-size: .95rem; }
    .exercise-weight { color: var(--accent); font-weight: 700; font-size: 1rem; }

    /* ---- Set bubbles ---- */
    .sets-grid {
      display: flex; gap: .6rem; flex-wrap: wrap;
      margin-top: 1rem;
    }
    .set-bubble {
      width: 52px; height: 52px;
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-weight: 700; font-size: .85rem;
      cursor: pointer;
      border: 2px solid var(--border);
      background: var(--bg);
      color: var(--muted);
      transition: background .15s, border-color .15s, color .15s, transform .1s;
      user-select: none;
    }
    .set-bubble:hover { border-color: var(--accent); color: var(--text); }
    .set-bubble.complete { background: var(--green); border-color: var(--green); color: #000; }
    .set-bubble.failed  { background: var(--red);   border-color: var(--red);   color: #fff; }
    .set-bubble:active  { transform: scale(.93); }

    /* ---- Rest timer ---- */
    #rest-timer {
      position: fixed; bottom: 1.5rem; left: 50%; transform: translateX(-50%);
      background: var(--surface); border: 1px solid var(--accent);
      border-radius: 999px; padding: .6rem 1.5rem;
      display: flex; align-items: center; gap: .75rem;
      font-weight: 700; font-size: 1rem;
      box-shadow: 0 4px 24px #0006;
      display: none;
    }
    #rest-timer.visible { display: flex; }
    #timer-count { font-size: 1.4rem; color: var(--accent); min-width: 2.5ch; text-align: center; }

    /* ---- Exercise section in workout ---- */
    .workout-exercise { margin-bottom: 2rem; }
    .workout-exercise-header {
      display: flex; align-items: baseline; justify-content: space-between;
      margin-bottom: .5rem;
    }
    .workout-exercise-name { font-weight: 700; font-size: 1.05rem; }
    .workout-exercise-weight { color: var(--accent); font-weight: 700; }

    /* ---- Forms (auth) ---- */
    .form-card { max-width: 360px; margin: 3rem auto; }
    .form-group { display: flex; flex-direction: column; gap: .4rem; margin-bottom: 1rem; }
    label { font-size: .85rem; color: var(--muted); }
    input[type=text], input[type=password] {
      background: var(--bg); color: var(--text);
      border: 1px solid var(--border); border-radius: 8px;
      padding: .65rem .9rem; font-size: 1rem;
      width: 100%;
    }
    input:focus { outline: none; border-color: var(--accent); }
    .form-error { color: var(--red); font-size: .85rem; margin-bottom: .75rem; }
    .form-footer { text-align: center; margin-top: 1rem; color: var(--muted); font-size: .85rem; }
    .form-footer a { color: var(--accent); text-decoration: none; }

    /* ---- Alerts ---- */
    .alert { padding: .75rem 1rem; border-radius: 8px; margin-bottom: 1rem; font-size: .9rem; }
    .alert-success { background: #22c55e22; border: 1px solid #22c55e55; color: var(--green); }
    .alert-error   { background: #ef444422; border: 1px solid #ef444455; color: var(--red); }

    /* ---- Progress bar (for rest timer) ---- */
    .timer-bar-wrap { width: 160px; height: 5px; background: var(--border); border-radius: 3px; }
    .timer-bar { height: 100%; background: var(--accent); border-radius: 3px; transition: width .5s linear; }

    /* ---- HTMX loading indicator ---- */
    .htmx-indicator { opacity: 0; transition: opacity 0.2s; }
    .htmx-request .htmx-indicator { opacity: 1; }
    .spinner {
      width: 18px; height: 18px; border-radius: 50%;
      border: 2px solid var(--border); border-top-color: var(--accent);
      animation: spin .6s linear infinite; display: inline-block;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ---- Responsive ---- */
    @media (max-width: 480px) {
      .card { padding: 1rem; }
      .set-bubble { width: 46px; height: 46px; font-size: .8rem; }
    }

    @media (max-width: 768px) {
      .theme-wrap { display: none; }
    }
  </style>
</head>
<body>
  <nav>
    <a class="logo" href="/workouts"><span>Smolt</span>5X5</a>
    <div class="nav-actions">
      <div class="theme-wrap">
        <button class="btn btn-ghost btn-sm" id="theme-button" type="button" aria-haspopup="menu" aria-expanded="false">Theme</button>
        <div id="theme-menu" class="theme-menu" hidden>
          <button type="button" class="theme-option" data-theme-value="light">Light</button>
          <button type="button" class="theme-option" data-theme-value="dark">Dark</button>
          <button type="button" class="theme-option" data-theme-value="forest">Forest</button>
          <button type="button" class="theme-option" data-theme-value="sunset">Sunset</button>
          <button type="button" class="theme-option" data-theme-value="dark_hc">Dark High Contrast</button>
        </div>
      </div>
      {{if .User}}
        <a class="btn btn-ghost btn-sm" href="/profile">Profile</a>
        <form method="POST" action="/logout" style="margin:0">
          <button class="btn btn-ghost btn-sm" type="submit">Logout</button>
        </form>
      {{end}}
    </div>
  </nav>

  <main class="page">
    {{block "content" .}}{{end}}
  </main>

  <script>
    (function() {
      var key = 'smolt-theme';
      var menu = document.getElementById('theme-menu');
      var button = document.getElementById('theme-button');
      var validThemes = ['light', 'dark', 'forest', 'sunset', 'dark_hc'];
      if (Array.isArray(window.smoltVimThemeNames)) {
        validThemes = validThemes.concat(window.smoltVimThemeNames);
      }

      function storedTheme() {
        var theme = localStorage.getItem(key) || 'light';
        if (validThemes.indexOf(theme) === -1) return 'light';
        return theme;
      }

      function markActive(theme) {
        if (!menu) return;
        var options = menu.querySelectorAll('[data-theme-value]');
        options.forEach(function(opt) {
          if (opt.getAttribute('data-theme-value') === theme) {
            opt.classList.add('active');
          } else {
            opt.classList.remove('active');
          }
        });
      }

      function apply(theme) {
        if (validThemes.indexOf(theme) === -1) {
          theme = 'light';
        }
        localStorage.setItem(key, theme);
        document.documentElement.setAttribute('data-theme', theme);
        if (typeof window.smoltApplyThemePalette === 'function') {
          window.smoltApplyThemePalette(theme);
        }
        markActive(theme);
      }

      function closeMenu() {
        if (!menu || !button) return;
        menu.hidden = true;
        button.setAttribute('aria-expanded', 'false');
      }

      function toggleMenu() {
        if (!menu || !button) return;
        var willOpen = menu.hidden;
        menu.hidden = !willOpen;
        button.setAttribute('aria-expanded', willOpen ? 'true' : 'false');
      }

      if (button) {
        button.addEventListener('click', function() {
          toggleMenu();
        });
      }

      document.addEventListener('click', function(e) {
        if (menu && button && !menu.hidden && !menu.contains(e.target) && !button.contains(e.target)) {
          closeMenu();
        }
      });

      if (menu) {
        menu.querySelectorAll('[data-theme-value]').forEach(function(opt) {
          opt.addEventListener('click', function() {
            apply(opt.getAttribute('data-theme-value'));
            closeMenu();
          });
        });
      }

      apply(storedTheme());

      window.smoltThemeApi = {
        setTheme: apply,
        getTheme: storedTheme,
      };
    })();

    (function() {
      function typeFromExerciseName(name) {
        if (name === 'Treadmill') return 'treadmill';
        if (name === 'Exercise Bike') return 'bike';
        if (name === 'Staircase') return 'staircase';
        if (name === 'Elliptical') return 'elliptical';
        return '';
      }

      function exerciseNameFromType(type) {
        if (type === 'treadmill') return 'Treadmill';
        if (type === 'bike') return 'Exercise Bike';
        if (type === 'staircase') return 'Staircase';
        if (type === 'elliptical') return 'Elliptical';
        return 'Cardio';
      }

      function defaultsForType(type, distanceUnit) {
        var defaults = {
          timeMinutes: 10,
          distanceDisplay: 0,
          usesDistance: false
        };

        if (type === 'treadmill') {
          defaults.timeMinutes = 10;
          defaults.distanceDisplay = distanceUnit === 'km' ? 1.5 : 1.0;
          defaults.usesDistance = true;
        } else if (type === 'bike') {
          defaults.timeMinutes = 20;
          defaults.distanceDisplay = distanceUnit === 'km' ? 5.0 : 3.0;
          defaults.usesDistance = true;
        } else if (type === 'staircase') {
          defaults.timeMinutes = 12;
        } else if (type === 'elliptical') {
          defaults.timeMinutes = 15;
        }

        return defaults;
      }

      function helperText(type, distanceUnit) {
        if (type === 'treadmill') {
          return 'Suggested default: 10 min and ' + (distanceUnit === 'km' ? '1.5 km' : '1.0 mi') + '. Pace updates live.';
        }
        if (type === 'bike') {
          return 'Suggested default: 20 min and ' + (distanceUnit === 'km' ? '5.0 km' : '3.0 mi') + '.';
        }
        if (type === 'staircase') {
          return 'Suggested default: 12 min duration-focused cardio.';
        }
        if (type === 'elliptical') {
          return 'Suggested default: 15 min steady-state cardio.';
        }
        return '';
      }

      window.smoltCardio = {
        typeFromExerciseName: typeFromExerciseName,
        exerciseNameFromType: exerciseNameFromType,
        defaultsForType: defaultsForType,
        defaultsForExerciseName: function(name, distanceUnit) {
          return defaultsForType(typeFromExerciseName(name), distanceUnit);
        },
        helperText: helperText
      };
    })();
  </script>

  {{block "scripts" .}}{{end}}
</body>
</html>{{end}}
