{{template "base" .}}

{{define "title"}}Register — SL5×5{{end}}

{{define "content"}}
<div class="form-card">
  <div class="card">
    <h1 class="card-title" style="font-size:1.4rem;margin-bottom:1.5rem">Create account</h1>

    {{if .Error}}
      <div class="alert alert-error">{{.Error}}</div>
    {{end}}

    <form method="POST" action="/register">
      <div class="form-group">
        <label for="username">Username <span style="color:var(--muted)">(min 3 chars)</span></label>
        <input type="text" id="username" name="username" autocomplete="username" required
               minlength="3" value="{{.Username}}">
      </div>
      <div class="form-group">
        <label for="password">Password <span style="color:var(--muted)">(min 3 chars)</span></label>
        <input type="password" id="password" name="password" autocomplete="new-password" required minlength="3">
      </div>
      <button class="btn btn-primary" style="width:100%;margin-top:.5rem" type="submit">Register</button>
    </form>

    <div class="form-footer">
      Already have an account? <a href="/login">Log in</a>
    </div>
  </div>
</div>
{{end}}
